<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/reset.css">
    <style>
        .box1 {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: purple;
            top: 0;
            right: 0;

        }

        .box2 {
            width: 460px;
            height: 300px;
            background-color: rgb(0, 204, 255);
            position: relative;
            margin: 20px;
            margin-bottom: 50px;


        }

        .box3 {
            position: absolute;
            width: 100%;
            height: 100px;
            background-color: yellow;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .box4 {
            width: 30px;
            height: 30px;       
            background-color: green;
            margin: 100px;

        }

        .box5 {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgb(136, 64, 31);
            bottom: 0;
            right: 0;



        }
    </style>


</head>

<body>

    <div class="box1"></div>
    <div class="box2">
        <h1>Willkommen</h1>
        <h2>Dies ist eine Übungsseite</h2>
        <ul>
            <li>Zweitens</li>
            <li>Erstens</li>
        </ul>
        <div class="box5"></div>
    </div>
    <div class="box3">
        <div class="box4"></div>
        <div class="box4"></div>
        <div class="box4"></div>
        <div class="box4"></div>
    </div>


    </div>
</body>

</html>
