<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let zaehler = 7;
        while (zaehler > 46) {
            console.log(zaehler);
            zaehler--;
        }

        for (let zaehler = 7; zaehler < 46; zaehler++) {
            console.log(zaehler);
        }

        for (let zaehler = 9; zaehler < 100; zaehler++) {
            console.log(zaehler);
        }

        //zaheler rückwarts von 10 bis 0
        for (let zaehler = 10; zaehler >= 0; zaehler--) {
            console.log(zaehler);
        }
        //zähle rückwarts von 1234 bis 1207
        for (let zaehler = 1234; zaehler >= 1207; zaehler--) {
            console.log(zaehler);
        }
        //Gib deinen Namen genau 8 mal aus
        for (let i = 0; i < 8; i++) {
            console.log("Noah");
        }
        //Zähle von 0 auf 10, dann gib deinenn Namen aus, dann zähle von 10 auf 0
    </script>
</body>

</html>
