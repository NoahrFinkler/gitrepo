<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aufgabe</title>
</head>

<body>
    <h1>Liste verwalten</h1>
    <input type="text" id="eingabe" placeholder="Wert einfügen...">
    <button onclick="hinzufügen()">Hinzufügen</button>
    <div id="liste"></div><br>



    <script>
        let werte = [];

        function hinzufügen() {
            let eingabeFeld = document.getElementById("eingabe");
            werte.push(eingabeFeld.value);
            listeAktualisieren();
            eingabeFeld.value = "";
        }

        function listeAktualisieren() {
            document.getElementById("liste").innerHTML = "";
            for (let i = 0; i < werte.length; i++)
                document.getElementById("liste").innerHTML += "<img src='" + werte[i] + "' alt='Bild " + (i + 1) + "'> <button onclick='entfernen(" + i + ")'>Entfernen</button><br>";
            console.log(werte[i]);
        }

        function entfernen(index) {
            werte.splice(index, 1);
            listeAktualisieren();
        }

    </script>

</body>

</html>
