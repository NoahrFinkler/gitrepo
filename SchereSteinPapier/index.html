<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schere-Stein-Papier</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.js">
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-fist-raised"></i> Schere • Stein • Papier</h1>

        <div class="scoreboard">
            <div class="score">
                <h2>Spieler</h2>
                <p id="player-score">0</p>
            </div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computer-score">0</p>
            </div>
        </div>

        <div class="choices">
            <button class="choice-btn" data-choice="schere">
                <i class="fas fa-hand-scissors"></i><br>Schere
            </button>
            <button class="choice-btn" data-choice="stein">
                <i class="fas fa-hand-rock"></i><br>Stein
            </button>
            <button class="choice-btn" data-choice="papier">
                <i class="fas fa-hand-paper"></i><br>Papier
            </button>
        </div>

        <div class="result">
            <h2>Runden-Ergebnis</h2>
            <p id="round-result">Wähle eine Option!</p>
            <div class="selections">
                <p>Spieler: <span id="player-choice">-</span></p>
                <p>Computer: <span id="computer-choice">-</span></p>
            </div>
        </div>

        <button id="reset-btn"><i class="fas fa-redo"></i> Spiel zurücksetzen</button>
    </div>

    <script src="js/game.js"></script>
</body>

</html>
